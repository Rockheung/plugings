# ~/mcps/docker-compose.yml 에 넣을 서비스 조각. 이 플러그인은 .mcp.json 으로
# http://127.0.0.1:19091/mcp (프록시) 에 연결만 시도한다 — 컨테이너 기동은 별개.
services:
  slack-explorer-mcp:
    image: ghcr.io/shibayu36/slack-explorer-mcp:latest
    container_name: slack-explorer-mcp
    restart: always
    environment:
      TRANSPORT: "http"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "19090"
    ports:
      - "19090:19090"
    expose:
      - "19090"
    networks:
      - slack-mcp-network

  slack-mcp-proxy:
    image: caddy:2
    container_name: slack-mcp-proxy
    restart: always
    depends_on:
      - slack-explorer-mcp
    environment:
      SLACK_USER_TOKEN: "${SLACK_USER_TOKEN}"
    volumes:
      - ./slack-mcp-Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "19091:19091"
    networks:
      - slack-mcp-network

networks:
  slack-mcp-network:
    driver: bridge
